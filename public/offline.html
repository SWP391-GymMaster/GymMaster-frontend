<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#18181B" />
    <title>GymMaster đang ngoại tuyến</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f4f4f5;
        color: #18181b;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(circle at 18% 12%, rgba(163, 230, 53, 0.18), transparent 32rem),
          linear-gradient(145deg, #fafafa 0%, #eef0ec 100%);
      }

      main {
        width: min(100%, 560px);
        padding: clamp(28px, 6vw, 48px);
        border: 1px solid rgba(255, 255, 255, 0.9);
        border-radius: 32px;
        background: rgba(255, 255, 255, 0.82);
        box-shadow: 0 24px 64px rgba(24, 24, 27, 0.14);
        text-align: center;
      }

      img {
        width: 88px;
        height: 88px;
        margin-bottom: 24px;
      }

      .eyebrow {
        margin: 0 0 10px;
        color: #4d7c0f;
        font-size: 0.75rem;
        font-weight: 800;
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-size: clamp(2rem, 8vw, 3.5rem);
        line-height: 0.98;
        letter-spacing: -0.055em;
      }

      p {
        margin: 20px auto 0;
        max-width: 42ch;
        color: #52525b;
        font-size: 1rem;
        line-height: 1.65;
      }

      button {
        min-width: 180px;
        min-height: 52px;
        margin-top: 30px;
        border: 0;
        border-radius: 999px;
        background: #a3e635;
        color: #18181b;
        cursor: pointer;
        font: inherit;
        font-weight: 800;
        transition: transform 180ms cubic-bezier(0.2, 0.8, 0.2, 1), box-shadow 180ms cubic-bezier(0.2, 0.8, 0.2, 1);
      }

      button:hover {
        transform: translateY(-2px);
        box-shadow: 0 12px 28px rgba(77, 124, 15, 0.22);
      }

      button:active {
        transform: scale(0.98);
      }

      button:focus-visible {
        outline: 3px solid #18181b;
        outline-offset: 4px;
      }

      .hint {
        margin-top: 18px;
        font-size: 0.8125rem;
        color: #71717a;
      }

      @media (prefers-reduced-motion: reduce) {
        button {
          transition: none;
        }
      }
    </style>
  </head>
  <body>
    <main aria-labelledby="offline-title">
      <img src="/icons/gymmaster-192.png" alt="Biểu tượng GymMaster" width="88" height="88" />
      <p class="eyebrow">Trạng thái kết nối</p>
      <h1 id="offline-title">Bạn đang ngoại tuyến</h1>
      <p role="status" aria-live="polite">
        GymMaster chưa thể kết nối tới máy chủ. Dữ liệu hội viên, thanh toán và check-in không được lưu ngoại tuyến để bảo vệ thông tin của bạn.
      </p>
      <button type="button" onclick="window.location.reload()">Thử kết nối lại</button>
      <p class="hint">Hãy kiểm tra Wi-Fi hoặc dữ liệu di động trước khi thử lại.</p>
    </main>
  </body>
</html>
